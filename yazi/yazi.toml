# Yazi base configuration

[manager]
ratio          = [1, 2, 4]   # panels: parent | current | preview
sort_by        = "natural"
sort_sensitive = false
sort_reverse   = false
sort_dir_first = true
show_hidden    = true
show_symlink   = true

[preview]
tab_size   = 2
max_width  = 600
max_height = 900

[opener]
edit = [
  { run = 'nvim "$@"', desc = "nvim", block = true },
]

[open]
prepend_rules = [
  { mime = "text/*",             use = "edit" },
  { mime = "application/json",  use = "edit" },
  { mime = "application/toml",  use = "edit" },
]
